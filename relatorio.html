<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório — URE Caieiras 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- html2pdf.js para gerar PDF no navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="js/database.js"></script>
    <script src="js/analise.js"></script>
    <script src="js/ui.js"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; }
        .sed-gradient { background: linear-gradient(135deg, #005CA9 0%, #CC0000 100%); }
        .action-card { border-left: 4px solid; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- HEADER (navegação) -->
<header class="sed-gradient text-white shadow-lg relative no-print">
    <div class="absolute top-3 right-4 bg-red-700 px-3 py-1 rounded-full text-xs font-bold">2026</div>
    <div class="container mx-auto px-4 py-4">
        <div class="flex flex-col md:flex-row items-center justify-between">
            <div class="flex items-center mb-3 md:mb-0">
                <img src="https://i.ibb.co/dscRg9Ms/LOGO-URE-CAIEIRAS-2-1.png" alt="Logo" class="h-14 mr-4">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold">Relatório de Mapeamento</h1>
                    <p class="text-sm opacity-90">Análise Multivariada — URE Caieiras 2026</p>
                </div>
            </div>
            <nav class="flex space-x-4 text-sm">
                <a href="index.html" class="hover:text-yellow-300 transition"><i class="fas fa-home mr-1"></i>Início</a>
                <a href="lista.html" class="hover:text-yellow-300 transition"><i class="fas fa-chart-pie mr-1"></i>Painel</a>
                <a href="cadastro.html" class="hover:text-yellow-300 transition"><i class="fas fa-plus-circle mr-1"></i>Novo</a>
            </nav>
        </div>
    </div>
</header>

<!-- CONTEÚDO DO RELATÓRIO (será renderizado via JS) -->
<div id="reportWrapper">
    <main id="reportContent" class="container mx-auto px-4 py-8 max-w-5xl">
        <div id="loading" class="text-center py-20">
            <i class="fas fa-spinner fa-spin text-4xl text-[#005CA9] mb-4"></i>
            <p class="text-gray-500">Carregando relatório...</p>
        </div>
    </main>
</div>

<footer class="bg-gradient-to-r from-blue-900 to-gray-900 text-white py-6 mt-12 no-print">
    <div class="container mx-auto px-4 text-center text-sm text-gray-400">
        <p>© 2026 URE Caieiras — SEDUC/SP</p>
    </div>
</footer>

<script>
const alunoId = getUrlParam('id');
let chartInstance = null;

async function carregarRelatorio() {
    if (!alunoId) {
        document.getElementById('loading').innerHTML = '<p class="text-red-500 text-lg"><i class="fas fa-exclamation-circle mr-2"></i>ID do aluno não informado.</p><a href="lista.html" class="mt-4 inline-block text-blue-600 underline">Voltar ao Painel</a>';
        return;
    }

    const d = DB.getById(alunoId);
    if (!d) {
        document.getElementById('loading').innerHTML = '<p class="text-red-500 text-lg"><i class="fas fa-exclamation-circle mr-2"></i>Aluno não encontrado.</p><a href="lista.html" class="mt-4 inline-block text-blue-600 underline">Voltar ao Painel</a>';
        return;
    }

    renderRelatorio(d);
}

function renderRelatorio(d) {
    const res = determinarPerfil(d);
    const risco = calcularNivelRisco(d);
    const fatores = calcularFatores(d);
    const perfil = PERFIS[res.key];

    document.title = `${d.nome || 'Aluno'} — Relatório — URE Caieiras`;

    const fatoresRiscoHtml = (d.fatoresRisco?.length)
        ? d.fatoresRisco.map(f => {
            const l = { trabalho:'Trabalho',cuidado:'Cuidado de familiares',saude:'Saúde física',mental:'Saúde mental',material:'Material escolar',alimentacao:'Alimentação',bullying:'Bullying',drogas:'Ilícitos' };
            return `<span class="inline-block px-2 py-1 bg-red-100 text-red-800 rounded-full text-xs mr-1 mb-1">${l[f]||f}</span>`;
        }).join('')
        : '<span class="text-gray-400 text-sm">Nenhum marcado</span>';

    const dificuldadesHtml = (d.dificuldades?.length)
        ? d.dificuldades.map(x => {
            const l = { matematica:'Matemática',portugues:'Português',ciencias:'Ciências',historia:'História',geografia:'Geografia',ingles:'Inglês',educacaofisica:'Ed. Física',artes:'Artes' };
            return `<span class="inline-block px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-xs mr-1 mb-1">${l[x]||x}</span>`;
        }).join('')
        : '<span class="text-gray-400 text-sm">Nenhuma marcada</span>';

    const statusSelectHtml = `
        <select id="statusSelect" onchange="updateStatus()" class="px-3 py-1 border rounded text-sm no-print">
            <option value="em_analise" ${d.status==='em_analise'?'selected':''}>Em Análise</option>
            <option value="em_acompanhamento" ${d.status==='em_acompanhamento'?'selected':''}>Em Acompanhamento</option>
            <option value="resolvido" ${d.status==='resolvido'?'selected':''}>Resolvido</option>
        </select>`;

    document.getElementById('reportContent').innerHTML = `
    <!-- AÇÕES -->
    <div class="flex flex-wrap gap-3 mb-6 no-print">
        <a href="lista.html" class="px-4 py-2 border rounded-md text-gray-700 hover:bg-gray-100 text-sm"><i class="fas fa-arrow-left mr-2"></i>Painel</a>
        <a href="cadastro.html?id=${d.id}" class="px-4 py-2 bg-yellow-500 text-white rounded-md hover:bg-yellow-600 text-sm"><i class="fas fa-edit mr-2"></i>Editar</a>
        <button onclick="generatePDF()" class="px-4 py-2 bg-[#CC0000] text-white rounded-md hover:bg-[#a30000] text-sm"><i class="fas fa-file-pdf mr-2"></i>Baixar PDF</button>
        <button onclick="window.print()" class="px-4 py-2 bg-gray-700 text-white rounded-md hover:bg-gray-800 text-sm"><i class="fas fa-print mr-2"></i>Imprimir</button>
    </div>

    <!-- ÁREA IMPRIMÍVEL -->
    <div id="printableArea">
        <!-- CABEÇALHO -->
        <div class="bg-white rounded-lg shadow-lg overflow-hidden mb-6">
            <div class="bg-[#003366] text-white p-6">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <h2 class="text-2xl font-bold">${d.nome || 'Aluno não identificado'}</h2>
                        <p class="text-sm opacity-80 mt-1">${formatAno(d.anoSerie)} · ${formatTurno(d.turno)} · ${d.idade || '?'} anos · Cadastro: ${new Date(d.createdAt).toLocaleDateString('pt-BR')}</p>
                    </div>
                    <div class="flex items-center gap-3 flex-wrap">
                        <span class="px-4 py-2 rounded-full text-sm font-bold text-white" style="background:${risco.hex}">Risco ${risco.nivel}</span>
                        ${statusSelectHtml}
                    </div>
                </div>
            </div>
        </div>

        <!-- PERFIL + GRÁFICO -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-semibold text-gray-800 mb-4"><i class="fas fa-fingerprint mr-2" style="color:${perfil.hex}"></i>Perfil Identificado</h3>
                <div class="text-center p-4 rounded-lg mb-4" style="background:${perfil.hex}15">
                    <i class="${perfil.icone} text-5xl mb-3 block" style="color:${perfil.hex}"></i>
                    <h4 class="font-bold text-lg text-gray-800">${perfil.nome}</h4>
                    <p class="text-xs text-gray-600 mt-1">${perfil.descricao}</p>
                </div>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between"><span class="text-gray-500">Frequência:</span><span class="font-bold">${d.frequenciaPercentual ?? '—'}%</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Média:</span><span class="font-bold">${d.mediaGeral ?? '—'}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Faltas:</span><span class="font-bold">${d.totalFaltas ?? '—'}</span></div>
                    <div class="flex justify-between"><span class="text-gray-500">Padrão:</span><span class="font-bold">${formatPadrao(d.padraoFaltas)}</span></div>
                </div>
            </div>
            <div class="lg:col-span-2 bg-white rounded-lg shadow p-6">
                <h3 class="font-semibold text-gray-800 mb-4"><i class="fas fa-chart-area mr-2 text-[#CC0000]"></i>Fatores de Influência</h3>
                <div class="h-72"><canvas id="chartRadar"></canvas></div>
            </div>
        </div>

        <!-- DADOS DETALHADOS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-semibold text-gray-800 mb-3"><i class="fas fa-chart-line mr-2 text-blue-600"></i>Frequência</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">% Frequência:</span><span class="font-medium">${d.frequenciaPercentual ?? '—'}%</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Total Faltas:</span><span class="font-medium">${d.totalFaltas ?? '—'}</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Padrão:</span><span class="font-medium">${formatPadrao(d.padraoFaltas)}</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Período:</span><span class="font-medium">${d.periodoAnalise || 8} semanas</span></div>
                    <div><span class="text-gray-500">Horários críticos:</span><div class="mt-1">${(d.horariosFaltas||[]).map(h=>({primeiras:'Primeiras aulas',ultimas:'Últimas aulas',posrecreio:'Pós-recreio',todos:'Todos'})[h]||h).join(', ')||'Não informado'}</div></div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-semibold text-gray-800 mb-3"><i class="fas fa-graduation-cap mr-2 text-green-600"></i>Acadêmico</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Média:</span><span class="font-medium">${d.mediaGeral ?? '—'}</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Tendência:</span><span class="font-medium">${formatTendencia(d.tendenciaNotas)}</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Participação:</span><span class="font-medium">${formatParticipacao(d.participacao)}</span></div>
                    <div><span class="text-gray-500">Dificuldades:</span><div class="mt-1">${dificuldadesHtml}</div></div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-semibold text-gray-800 mb-3"><i class="fas fa-home mr-2 text-purple-600"></i>Sociofamiliar</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Transporte:</span><span class="font-medium">${formatTransporte(d.transporte)}</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Deslocamento:</span><span class="font-medium">${d.tempoDeslocamento || '—'} min</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Acompanhamento:</span><span class="font-medium">${formatAcompanhamento(d.acompanhamento)}</span></div>
                    <div class="flex justify-between border-b pb-2"><span class="text-gray-500">Situação:</span><span class="font-medium">${formatSituacao(d.situacaoFamiliar)}</span></div>
                    <div><span class="text-gray-500">Fatores Risco:</span><div class="mt-1">${fatoresRiscoHtml}</div></div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="font-semibold text-gray-800 mb-3"><i class="fas fa-tachometer-alt mr-2 text-yellow-600"></i>Pontuação</h3>
                <div class="space-y-3">
                    ${Object.entries(res.pontos).map(([k,v]) => {
                        const labels={academico:'Acadêmico',transporte:'Transporte',familiar:'Familiar',saude:'Saúde',motivacional:'Motivacional'};
                        const max=Math.max(...Object.values(res.pontos),1);
                        const colors={academico:'#3B82F6',transporte:'#F59E0B',familiar:'#8B5CF6',saude:'#10B981',motivacional:'#EF4444'};
                        return `<div><div class="flex justify-between text-xs mb-1"><span class="font-medium">${labels[k]}</span><span class="font-bold">${v} pts</span></div><div class="h-2 bg-gray-200 rounded-full"><div class="h-full rounded-full" style="width:${(v/max)*100}%;background:${colors[k]}"></div></div></div>`;
                    }).join('')}
                </div>
            </div>
        </div>

        <!-- AÇÕES -->
        <div class="mb-6">
            <h3 class="font-semibold text-gray-800 mb-4 text-lg"><i class="fas fa-tasks mr-2" style="color:${perfil.hex}"></i>Plano de Ações</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                ${perfil.acoes.map(a => `
                    <div class="action-card bg-white p-5 rounded-lg shadow-sm" style="border-left-color:${perfil.hex}">
                        <span class="text-xs font-bold px-2 py-0.5 rounded" style="background:${perfil.hex}20;color:${perfil.hex}">${a.tipo}</span>
                        <h4 class="font-bold text-gray-800 text-sm mt-1">${a.titulo}</h4>
                        <p class="text-xs text-gray-600 mt-1 mb-3">${a.descricao}</p>
                        <div class="text-xs text-gray-500 space-y-1">
                            <p><i class="fas fa-user-tie mr-1" style="color:${perfil.hex}"></i><b>Resp.:</b> ${a.responsavel}</p>
                            <p><i class="fas fa-calendar-alt mr-1" style="color:${perfil.hex}"></i><b>Prazo:</b> ${a.prazo}</p>
                            <p><i class="fas fa-tools mr-1" style="color:${perfil.hex}"></i><b>Recursos:</b> ${a.recursos}</p>
                        </div>
                    </div>`).join('')}
            </div>
        </div>

        <!-- MONITORAMENTO -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h3 class="font-semibold text-gray-800 mb-4"><i class="fas fa-binoculars mr-2 text-[#005CA9]"></i>Monitoramento</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                <div class="bg-blue-50 p-4 rounded-lg"><h5 class="font-semibold text-blue-800 text-sm mb-2"><i class="fas fa-calendar-check mr-1"></i>Frequência</h5><ul class="text-xs text-gray-600 space-y-1"><li>✓ Checagem diária</li><li>✓ Contato semanal família</li><li>✓ Relatório quinzenal</li></ul></div>
                <div class="bg-green-50 p-4 rounded-lg"><h5 class="font-semibold text-green-800 text-sm mb-2"><i class="fas fa-chart-line mr-1"></i>Resultados</h5><ul class="text-xs text-gray-600 space-y-1"><li>✓ Reavaliação 15 dias</li><li>✓ Ajuste se necessário</li><li>✓ Meta: +15% freq. 30d</li></ul></div>
                <div class="bg-purple-50 p-4 rounded-lg"><h5 class="font-semibold text-purple-800 text-sm mb-2"><i class="fas fa-users mr-1"></i>Equipe</h5><ul class="text-xs text-gray-600 space-y-1"><li>✓ Reuniões semanais</li><li>✓ Comunicação família-escola</li><li>✓ Rede de apoio</li></ul></div>
            </div>
            <div class="p-4 bg-gray-50 rounded-lg">
                <h5 class="font-semibold text-sm text-gray-700 mb-3">Indicadores de Sucesso</h5>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                    <div><div class="text-2xl font-bold text-blue-700">${Math.min((d.frequenciaPercentual||0)+15,100)}%</div><div class="text-[11px] text-gray-500">Meta freq. (30d)</div></div>
                    <div><div class="text-2xl font-bold text-green-700">${Math.min((d.mediaGeral||0)+1,10).toFixed(1)}</div><div class="text-[11px] text-gray-500">Meta média (30d)</div></div>
                    <div><div class="text-2xl font-bold text-purple-700">80%</div><div class="text-[11px] text-gray-500">Redução faltas (60d)</div></div>
                    <div><div class="text-2xl font-bold text-yellow-700">4</div><div class="text-[11px] text-gray-500">Encontros família</div></div>
                </div>
            </div>
        </div>

        <!-- RODAPÉ RELATÓRIO -->
        <div class="text-center text-xs text-gray-400 mt-8 pt-4 border-t">
            <p>Documento gerado em ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')} — URE Caieiras — SEDUC/SP 2026</p>
            <p class="mt-1">Sistema de Mapeamento de Alunos Faltosos — Resolução SEDUC 39/2023</p>
        </div>
    </div>`;

    // Gráfico radar
    setTimeout(() => {
        const ctx = document.getElementById('chartRadar');
        if (ctx && typeof Chart !== 'undefined') {
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx.getContext('2d'), {
                type: 'radar',
                data: {
                    labels: fatores.map(f => f.nome),
                    datasets: [{ data: fatores.map(f => f.valor), backgroundColor: 'rgba(204,0,0,0.12)', borderColor: '#CC0000', borderWidth: 2, pointBackgroundColor: fatores.map(f => f.cor), pointBorderColor: '#fff', pointBorderWidth: 2 }]
                },
                options: {
                    scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20, callback: v => v + '%' } } },
                    plugins: { legend: { display: false } }
                }
            });
        }
    }, 200);
}

/* ═══ STATUS UPDATE ═══ */
function updateStatus() {
    const status = document.getElementById('statusSelect').value;
    DB.updateStatus(alunoId, status);
    showToast('Status atualizado: ' + formatStatus(status));
}

/* ═══ GERAR PDF (html2pdf.js) ═══ */
function generatePDF() {
    const el = document.getElementById('printableArea');
    if (!el) { showToast('Área do relatório não encontrada', 'error'); return; }

    // Feedback visual
    const btns = document.querySelectorAll('.no-print button, .no-print a');
    const originalStates = [];
    btns.forEach(b => { originalStates.push(b.innerHTML); b.disabled = true; });

    showToast('Gerando PDF, aguarde...', 'success');

    const opt = {
        margin: [10, 10, 10, 10],
        filename: `relatorio-${(document.title || 'aluno').replace(/\s+/g, '_')}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
            scale: 2,
            useCORS: true,
            logging: false,
            letterRendering: true
        },
        jsPDF: {
            unit: 'mm',
            format: 'a4',
            orientation: 'portrait'
        },
        pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };

    html2pdf().set(opt).from(el).save().then(() => {
        showToast('PDF gerado com sucesso!');
        btns.forEach((b, i) => { b.disabled = false; b.innerHTML = originalStates[i]; });
    }).catch(err => {
        console.error('Erro PDF:', err);
        showToast('Erro ao gerar PDF. Use Ctrl+P.', 'error');
        btns.forEach((b, i) => { b.disabled = false; b.innerHTML = originalStates[i]; });
    });
}

document.addEventListener('DOMContentLoaded', carregarRelatorio);
</script>
</body>
</html>
